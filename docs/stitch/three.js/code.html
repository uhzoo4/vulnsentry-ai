<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  const devicePixelRatio = window.devicePixelRatio || 1;
  /**
 * VulnSentry Connection Landscape: Floating Topology
 * A self-contained Three.js scene featuring drifting nodes and breathing lines.
 */

const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Materials using Design System colors (Steel Blue & Pale Silver)
const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0x4682B4, transparent: true, opacity: 0.8 });
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xC0C0C0, transparent: true, opacity: 0.2 });

const nodes = [];
const nodeCount = 40;
const nodeGroup = new THREE.Group();

for (let i = 0; i < nodeCount; i++) {
  const geometry = new THREE.SphereGeometry(0.04, 16, 16);
  const node = new THREE.Mesh(geometry, nodeMaterial);
  node.position.set(
    (Math.random() - 0.5) * 10,
    (Math.random() - 0.5) * 6,
    (Math.random() - 0.5) * 4
  );
  node.userData = {
    velocity: new THREE.Vector3(
      (Math.random() - 0.5) * 0.005,
      (Math.random() - 0.5) * 0.005,
      (Math.random() - 0.5) * 0.005
    )
  };
  nodes.push(node);
  nodeGroup.add(node);
}
scene.add(nodeGroup);

// Lines connecting nodes
const lineGeometry = new THREE.BufferGeometry();
const linePositions = new Float32Array(nodeCount * nodeCount * 3);
lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const connections = new THREE.LineSegments(lineGeometry, lineMaterial);
scene.add(connections);

function updateLines() {
  const positions = connections.geometry.attributes.position.array;
  let counter = 0;
  for (let i = 0; i < nodeCount; i++) {
    for (let j = i + 1; j < nodeCount; j++) {
      const dist = nodes[i].position.distanceTo(nodes[j].position);
      if (dist < 2.5) {
        positions[counter++] = nodes[i].position.x;
        positions[counter++] = nodes[i].position.y;
        positions[counter++] = nodes[i].position.z;
        positions[counter++] = nodes[j].position.x;
        positions[counter++] = nodes[j].position.y;
        positions[counter++] = nodes[j].position.z;
      }
    }
  }
  connections.geometry.attributes.position.needsUpdate = true;
}

function animate() {
  requestAnimationFrame(animate);

  nodes.forEach(node => {
    node.position.add(node.userData.velocity);
    // Boundary check
    if (Math.abs(node.position.x) > 5) node.userData.velocity.x *= -1;
    if (Math.abs(node.position.y) > 3) node.userData.velocity.y *= -1;
    if (Math.abs(node.position.z) > 2) node.userData.velocity.z *= -1;
  });

  nodeGroup.rotation.y += 0.001;
  updateLines();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
